<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  .generador-wrapper {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 0;
  }

  .generador-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0;
  }

  .generador-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .generador-header h1 {
    font-size: 32px;
    font-weight: 700;
    color: #1a202c;
    margin-bottom: 10px;
  }

  .generador-header p {
    font-size: 16px;
    color: #718096;
  }

  .generador-form-group {
    margin-bottom: 24px;
  }

  .generador-form-group label {
    display: block;
    margin-bottom: 8px;
    font-weight: 600;
    color: #2d3748;
    font-size: 14px;
  }

  .generador-form-group input[type="text"],
  .generador-form-group input[type="email"],
  .generador-form-group textarea,
  .generador-form-group select {
    width: 100%;
    padding: 12px 16px;
    border: 2px solid #07202F;
    border-radius: 10px;
    font-size: 15px;
    font-family: inherit;
    transition: all 0.3s ease;
    background: #f7fafc;
  }

  .generador-form-group input[type="text"]:focus,
  .generador-form-group input[type="email"]:focus,
  .generador-form-group textarea:focus,
  .generador-form-group select:focus {
    outline: none;
    border-color: #07202F;
    background: white;
    box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
  }

  .generador-form-group textarea {
    resize: vertical;
    min-height: 80px;
  }

  .generador-input-with-mic {
    display: flex;
    gap: 8px;
  }

  .generador-input-with-mic input,
  .generador-input-with-mic textarea {
    flex: 1;
  }

  .generador-mic-button {
    width: 48px;
    height: 48px;
    border: 2px solid #e2e8f0;
    border-radius: 10px;
    background: #f7fafc;
    cursor: pointer;
    font-size: 20px;
    transition: all 0.3s ease;
    flex-shrink: 0;
  }

  .generador-mic-button:hover {
    background: #667eea;
    border-color: #667eea;
    transform: scale(1.05);
  }

  .generador-mic-button:active {
    transform: scale(0.95);
  }

  .generador-button-group {
    display: flex;
    gap: 12px;
    margin: 32px 0;
  }

  .generador-btn {
    flex: 1;
    padding: 16px 24px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
  }

  .generador-btn-primary {
    background: #FF0000;
    color: white;
  }

  .generador-btn-primary:hover {
    background: #CC0000;
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(255, 0, 0, 0.3);
  }

  .generador-btn-secondary {
    background: #1a202c;
    color: white;
  }

  .generador-btn-secondary:hover {
    background: #2d3748;
    transform: translateY(-2px);
    box-shadow: 0 10px 25px rgba(26, 32, 44, 0.3);
  }

  .generador-btn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
  }

  .generador-btn:active:not(:disabled) {
    transform: translateY(0);
  }

  #promptResultado {
    font-family: 'Courier New', monospace;
    font-size: 13px;
    min-height: 300px;
    background: #f7fafc;
  }

  .generador-section-title {
    font-size: 20px;
    font-weight: 700;
    color: #1a202c;
    margin: 32px 0 20px 0;
    padding-bottom: 12px;
    border-bottom: 3px solid #07202F;
  }

  .generador-helper-text {
    font-size: 13px;
    color: #718096;
    margin-top: 4px;
  }

  .generador-modal {
    display: none;
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .generador-modal.active {
    display: flex;
  }

  .generador-modal-content {
    background: white;
    padding: 50px 40px;
    border-radius: 24px;
    max-width: 500px;
    width: 90%;
    text-align: center;
    animation: slideUp 0.3s ease;
    box-shadow: 0 25px 50px rgba(7, 32, 47, 0.3);
    border-top: 6px solid #07202F;
  }

  @keyframes slideUp {
    from {
      opacity: 0;
      transform: translateY(30px);
    }
    to {
      opacity: 1;
      transform: translateY(0);
    }
  }

  .generador-modal h2 {
    font-size: 28px;
    margin-bottom: 16px;
    color: #07202F;
    font-weight: 700;
  }

  .generador-modal p {
    color: #4a5568;
    margin-bottom: 28px;
    line-height: 1.7;
    font-size: 16px;
  }

  .generador-modal input {
    width: 100%;
    margin-bottom: 24px;
    padding: 16px 20px;
    border: 2px solid #e2e8f0;
    border-radius: 12px;
    font-size: 16px;
    transition: all 0.3s ease;
    background: #f7fafc;
  }

  .generador-modal input:focus {
    outline: none;
    border-color: #07202F;
    background: white;
    box-shadow: 0 0 0 4px rgba(7, 32, 47, 0.1);
  }

  .generador-modal .generador-btn {
    width: 100%;
    padding: 18px 24px;
    font-size: 18px;
    background: #07202F;
    border-radius: 12px;
  }

  .generador-modal .generador-btn:hover {
    background: #0a2d42;
    transform: translateY(-2px);
    box-shadow: 0 12px 30px rgba(7, 32, 47, 0.4);
  }

  .generador-success-message {
    display: none;
    background: #48bb78;
    color: white;
    padding: 16px;
    border-radius: 10px;
    margin: 20px 0;
    text-align: center;
    font-weight: 600;
  }

  .generador-success-message.active {
    display: block;
  }

  .generador-loading {
    display: inline-block;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 1s ease-in-out infinite;
  }

  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>

<div class="generador-wrapper">
  <div class="generador-container">
    <form id="adForm">
      <!-- VERSIONES -->
      <div class="generador-form-group">
        <label for="versiones">¿Cuántas versiones de anuncio quieres?</label>
        <select id="versiones" required>
          <option value="2">2 versiones (recomendado)</option>
          <option value="1">1 versión</option>
          <option value="3">3 versiones</option>
        </select>
      </div>

      <div class="generador-section-title">Información del Negocio</div>

      <!-- TIPO DE NEGOCIO -->
      <div class="generador-form-group">
        <label for="tipoNegocio">Tipo de negocio / profesión</label>
        <div class="generador-input-with-mic">
          <input id="tipoNegocio" type="text" 
            placeholder="Ej. clínica estética, restaurante, doctor, abogado..." required>
          <button type="button" class="generador-mic-button" onclick="startDictation('tipoNegocio')">🎙</button>
        </div>
      </div>

      <!-- NOMBRE DEL NEGOCIO -->
      <div class="generador-form-group">
        <label for="nombreNegocio">Nombre del negocio (opcional)</label>
        <div class="generador-input-with-mic">
          <input id="nombreNegocio" type="text" placeholder="Ej. Econo, Hernandez Media">
          <button type="button" class="generador-mic-button" onclick="startDictation('nombreNegocio')">🎙</button>
        </div>
      </div>

      <!-- TELÉFONO -->
      <div class="generador-form-group">
        <label for="telefono">Número de teléfono (si quieres incluirlo)</label>
        <div class="generador-input-with-mic">
          <input id="telefono" type="text" placeholder="Ej. (787) 000-0000">
          <button type="button" class="generador-mic-button" onclick="startDictation('telefono')">🎙</button>
        </div>
      </div>

      <div class="generador-section-title">Oferta y Objetivo</div>

      <!-- OFERTA -->
      <div class="generador-form-group">
        <label for="oferta">Producto / servicio / oferta</label>
        <div class="generador-input-with-mic">
          <textarea id="oferta" rows="2" 
            placeholder="Explica en 1 frase qué ofreces en tu negocio" required></textarea>
          <button type="button" class="generador-mic-button" onclick="startDictation('oferta')">🎙</button>
        </div>
      </div>

      <!-- PRECIO -->
      <div class="generador-form-group">
        <label for="precio">Precio del producto o servicio</label>
        <div class="generador-input-with-mic">
          <input id="precio" type="text" placeholder="Ej. $97, $997, high ticket..." required>
          <button type="button" class="generador-mic-button" onclick="startDictation('precio')">🎙</button>
        </div>
      </div>

      <!-- OBJETIVO -->
      <div class="generador-form-group">
        <label for="objetivo">Objetivo principal del anuncio</label>
        <select id="objetivo" required>
          <option value="">Selecciona uno</option>
          <option>Generar leads</option>
          <option>Agendar llamadas</option>
          <option>Vender producto o servicios</option>
          <option>Llenar un taller</option>
          <option>Descargar un recurso</option>
          <option>Aumentar mensajes</option>
        </select>
      </div>

      <div class="generador-section-title">Cliente Ideal</div>

      <!-- QUIEN ES -->
      <div class="generador-form-group">
        <label for="quienEs">¿A quién va dirigido este anuncio?</label>
        <div class="generador-input-with-mic">
          <input id="quienEs" type="text" 
            placeholder="Ej. dueños de negocio, mamás emprendedoras..." required>
          <button type="button" class="generador-mic-button" onclick="startDictation('quienEs')">🎙</button>
        </div>
      </div>

      <!-- TEMPERATURA -->
      <div class="generador-form-group">
        <label for="temperatura">Esta audiencia está...</label>
        <select id="temperatura" required>
          <option value="frío">Frío (no te conocen)</option>
          <option value="mediano">Mediano (te han visto)</option>
          <option value="caliente">Caliente (casi listos para comprar)</option>
        </select>
      </div>

      <div class="generador-section-title">Problema y Solución</div>

      <!-- PROBLEMA -->
      <div class="generador-form-group">
        <label for="problema">Problema principal que resuelves</label>
        <div class="generador-input-with-mic">
          <textarea id="problema" rows="2" 
            placeholder="Describe qué problema resuelves..." required></textarea>
          <button type="button" class="generador-mic-button" onclick="startDictation('problema')">🎙</button>
        </div>
      </div>

      <!-- DESEO -->
      <div class="generador-form-group">
        <label for="deseo">¿Cuál es el deseo principal de tu cliente?</label>
        <div class="generador-input-with-mic">
          <textarea id="deseo" rows="2" 
            placeholder="Ej. Comprar una casa, resolver problema de celulitis, Recortar el patio, Necesitan un seguro, Remodelar la casa..." required></textarea>
          <button type="button" class="generador-mic-button" onclick="startDictation('deseo')">🎙</button>
        </div>
      </div>

      <!-- BENEFICIOS -->
      <div class="generador-form-group">
        <label for="beneficios">Beneficios principales</label>
        <div class="generador-input-with-mic">
          <textarea id="beneficios" rows="3" 
            placeholder="Un beneficio por línea..." required></textarea>
          <button type="button" class="generador-mic-button" onclick="startDictation('beneficios')">🎙</button>
        </div>
        <div class="generador-helper-text">Escribe cada beneficio en una línea diferente</div>
      </div>

      <div class="generador-section-title">Credibilidad y Extras</div>

      <!-- PRUEBA -->
      <div class="generador-form-group">
        <label for="prueba">Prueba / Credibilidad</label>
        <div class="generador-input-with-mic">
          <textarea id="prueba" rows="2" 
            placeholder="Años de experiencia, resultados, testimonios..." required></textarea>
          <button type="button" class="generador-mic-button" onclick="startDictation('prueba')">🎙</button>
        </div>
      </div>

      <!-- GARANTÍA -->
      <div class="generador-form-group">
        <label for="garantia">Garantía o seguridad (si existe)</label>
        <div class="generador-input-with-mic">
          <textarea id="garantia" rows="2" 
            placeholder="Ej. garantía de 7 días..."></textarea>
          <button type="button" class="generador-mic-button" onclick="startDictation('garantia')">🎙</button>
        </div>
      </div>

      <!-- BONUS -->
      <div class="generador-form-group">
        <label for="bonus">Bonos incluidos (si aplica)</label>
        <div class="generador-input-with-mic">
          <textarea id="bonus" rows="2" 
            placeholder="Ej. Libros digitales, clases extras, 2x1..."></textarea>
          <button type="button" class="generador-mic-button" onclick="startDictation('bonus')">🎙</button>
        </div>
      </div>

      <!-- TONO -->
      <div class="generador-form-group">
        <label for="tono">¿Qué tono quieres para tu anuncio?</label>
        <select id="tono" required>
          <option value="conversacional">Conversacional (como si habláramos)</option>
          <option value="emocional">Emocional y motivador</option>
          <option value="educativo">Educativo y claro</option>
          <option value="directo">Directo y sin rodeos</option>
          <option value="storytelling">"Storytelling"</option>
        </select>
      </div>

      <!-- BOTONES -->
      <div class="generador-button-group">
        <button type="button" id="generarPromptBtn" class="generador-btn generador-btn-primary">
          Generar Comando
        </button>
      </div>

      <div id="successMessage" class="generador-success-message">
        ¡Datos enviados correctamente!
      </div>

      <!-- RESULTADO -->
      <div class="generador-form-group" id="resultadoContainer" style="display: none;">
        <label for="promptResultado">Comando generado</label>
        <textarea id="promptResultado" 
          placeholder="Aquí se generará tu prompt listo para copiar..." 
          readonly></textarea>
        <button type="button" id="copiarPromptBtn" class="generador-btn generador-btn-secondary" style="margin-top: 12px;">
          Copiar al Portapapeles
        </button>
      </div>
    </form>
  </div>
</div>

<!-- MODAL EMAIL -->
<div id="emailModal" class="generador-modal">
  <div class="generador-modal-content">
    <h2>¡Un último paso!</h2>
    <p>Para generar tu comando personalizado y enviarte una copia por email, necesitamos tu correo electrónico:</p>
    <input type="email" id="emailInput" placeholder="correo@ejemplo.com" required>
    <button id="submitEmailBtn" class="generador-btn generador-btn-primary">
      Generar Comando
    </button>
  </div>
</div>

<script>
(function() {
  let generadorRecognitionInstance = null;
  let generadorGeneratedPrompt = "";

  function getRecognition() {
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SpeechRecognition) {
      alert("Tu navegador no soporta dictado por voz. Usa Google Chrome para esta función.");
      return null;
    }
    if (!generadorRecognitionInstance) {
      generadorRecognitionInstance = new SpeechRecognition();
      generadorRecognitionInstance.lang = "es-ES";
      generadorRecognitionInstance.interimResults = false;
      generadorRecognitionInstance.maxAlternatives = 1;
    }
    return generadorRecognitionInstance;
  }

  window.startDictation = function(targetId) {
    const recognition = getRecognition();
    if (!recognition) return;
    const field = document.getElementById(targetId);
    if (!field) return;

    recognition.onresult = function(event) {
      const transcript = event.results[0][0].transcript;
      field.value = field.value && field.value.trim().length > 0
        ? field.value + " " + transcript
        : transcript;
      field.focus();
    };

    recognition.onerror = function(event) {
      console.error("Error voz:", event.error);
    };

    recognition.start();
  };

  function getAllFormData() {
    return {
      versiones: document.getElementById("versiones").value,
      tipoNegocio: document.getElementById("tipoNegocio").value,
      nombreNegocio: document.getElementById("nombreNegocio").value,
      telefono: document.getElementById("telefono").value,
      oferta: document.getElementById("oferta").value,
      precio: document.getElementById("precio").value,
      objetivo: document.getElementById("objetivo").value,
      quienEs: document.getElementById("quienEs").value,
      temperatura: document.getElementById("temperatura").value,
      problema: document.getElementById("problema").value,
      deseo: document.getElementById("deseo").value,
      beneficios: document.getElementById("beneficios").value,
      prueba: document.getElementById("prueba").value,
      garantia: document.getElementById("garantia").value,
      bonus: document.getElementById("bonus").value,
      tono: document.getElementById("tono").value,
      timestamp: new Date().toISOString()
    };
  }

  function generarPrompt() {
    const data = getAllFormData();
    
    let prompt = "";
    prompt += "Actúa como un copywriter de clase mundial especializado en Direct Response Marketing.\n\n";
    prompt += `Quiero que redactes ${data.versiones} versiones de un anuncio para Facebook.\n\n`;
    prompt += `Tipo de negocio / profesión: ${data.tipoNegocio}\n\n`;

    if (data.nombreNegocio) {
      prompt += `Nombre del negocio / marca: ${data.nombreNegocio}\n\n`;
    }

    if (data.telefono) {
      prompt += `Número de Teléfono: ${data.telefono}\n\n`;
    }

    prompt += `Producto / servicio / oferta: ${data.oferta}\n\n`;
    prompt += `Precio / rango de inversión: ${data.precio}\n\n`;
    prompt += `Objetivo principal del anuncio: ${data.objetivo}\n\n`;

    prompt += "Cliente ideal:\n\n";
    prompt += `Quién es: ${data.quienEs}\n`;
    prompt += `Punto en el que está: ${data.temperatura}\n\n`;

    prompt += `Problema principal que tiene ahora: ${data.problema}\n\n`;
    prompt += `Deseo principal que quiere lograr: ${data.deseo}\n\n`;

    prompt += "Detalles clave de la oferta:\n\n";
    prompt += `Beneficios principales:\n${data.beneficios}\n\n`;
    prompt += `Prueba / credibilidad: ${data.prueba}\n\n`;

    if (data.garantia) {
      prompt += `Garantía o reducción de riesgo: ${data.garantia}\n\n`;
    }

    if (data.bonus) {
      prompt += `Bonus incluidos:\n${data.bonus}\n\n`;
    }

    prompt += `Tono y estilo deseado: ${data.tono}\n\n`;

    prompt += "Instrucciones de copywriting:\n\n";
    prompt += "Usa todos los principios del Direct Response Marketing: claridad extrema, enfoque en un solo objetivo, beneficios específicos, lenguaje emocional, urgencia o razón para actuar ahora, disminución de riesgo y un llamado a la acción claro.\n\n";
    prompt += "Estructura cada anuncio con:\n\n";
    prompt += "- Hook poderoso para detener el scroll.\n";
    prompt += "- Problema + agitación del problema (que el lector se identifique).\n";
    prompt += "- Promesa / Beneficio principal explicado de forma específica.\n";
    prompt += "- Prueba / autoridad / credibilidad.\n";
    prompt += "- Presentación de la oferta con lo que incluye.\n";
    prompt += "- Urgencia o motivo para decidir ahora.\n";
    prompt += "- Llamado a la acción único y directo.\n\n";
    prompt += "Escribe en un lenguaje claro, sencillo y hablado, como si estuviéramos conversando directamente con el cliente ideal.\n\n";
    prompt += "Evita frases genéricas. Enfócate en resultados concretos y transformaciones reales.\n\n";
    prompt += "Formato de entrega:\n";
    prompt += "Para cada versión del anuncio, entrégame:\n\n";
    prompt += "1. Texto principal del anuncio\n";
    prompt += "2. Variación de titular (headline) corta y contundente\n";
    prompt += "3. Sugerencia de llamada a la acción (CTA) específica\n\n";
    prompt += "Si falta algún dato, haz suposiciones estratégicas y crea igual los anuncios.";

    generadorGeneratedPrompt = prompt;
    document.getElementById("promptResultado").value = prompt;
    document.getElementById("copiarPromptBtn").disabled = false;
  }

  async function enviarDatosWebhook(email) {
    const data = getAllFormData();
    data.email = email;
    data.prompt = generadorGeneratedPrompt;

    try {
      const response = await fetch('https://webhook.ottokit.com/ottokit/f794c098-c5b7-4c18-a597-24ef1a0f0c3a', {
        method: 'POST',
        mode: 'no-cors',
        headers: {
          'Content-Type': 'application/json',
        },
        body: JSON.stringify(data)
      });

      return true;
    } catch (error) {
      console.error('Error:', error);
      return true;
    }
  }

  // Event Listeners
  document.getElementById("generarPromptBtn").addEventListener("click", function() {
    const form = document.getElementById("adForm");
    if (!form.checkValidity()) {
      form.reportValidity();
      return;
    }
    // Abrir modal para pedir email antes de generar
    document.getElementById("emailModal").classList.add("active");
  });

  document.getElementById("submitEmailBtn").addEventListener("click", async function() {
    const email = document.getElementById("emailInput").value;
    if (!email || !email.includes('@')) {
      alert("Por favor ingresa un email válido.");
      return;
    }

    const btn = this;
    const originalText = btn.innerHTML;
    btn.innerHTML = '<span class="generador-loading"></span> Generando...';
    btn.disabled = true;

    // Generar el prompt
    generarPrompt();

    // Enviar datos al webhook
    const success = await enviarDatosWebhook(email);

    if (success) {
      // Cerrar modal y mostrar resultado
      document.getElementById("emailModal").classList.remove("active");
      document.getElementById("resultadoContainer").style.display = "block";
      document.getElementById("successMessage").classList.add("active");
      
      setTimeout(() => {
        document.getElementById("successMessage").classList.remove("active");
      }, 5000);

      // Scroll al resultado
      document.getElementById("resultadoContainer").scrollIntoView({ behavior: 'smooth' });
    } else {
      alert("Hubo un error al enviar los datos. Por favor intenta de nuevo.");
    }

    btn.innerHTML = originalText;
    btn.disabled = false;
    document.getElementById("emailInput").value = "";
  });

  document.getElementById("copiarPromptBtn").addEventListener("click", async function() {
    if (!generadorGeneratedPrompt) {
      alert("No hay comando para copiar.");
      return;
    }

    try {
      await navigator.clipboard.writeText(generadorGeneratedPrompt);
      const btn = this;
      const originalText = btn.innerHTML;
      btn.innerHTML = "✓ ¡Copiado!";
      
      setTimeout(() => {
        btn.innerHTML = originalText;
      }, 2000);
    } catch (err) {
      alert("No se pudo copiar automáticamente. Por favor selecciona el texto y copia manualmente.");
    }
  });

  // Cerrar modal al hacer clic fuera
  document.getElementById("emailModal").addEventListener("click", function(e) {
    if (e.target === this) {
